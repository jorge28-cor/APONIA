<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aponia – Registro de Pago</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:       #7a9e7e;
    --sage-light: #a8c5a0;
    --sage-dark:  #4a6b4e;
    --bg:         #8f9e85;
    --cream:      #f5f0e8;
    --warm:       #ede8dc;
    --stone:      #c4b89a;
    --deep:       #2c3e2d;
    --text:       #3a3a2e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    font-family: 'Jost', sans-serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(255,255,255,0.13) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(44,62,45,0.28) 0%, transparent 55%);
    pointer-events: none;
  }

  .card {
    background: var(--cream);
    border-radius: 14px;
    width: 100%;
    max-width: 440px;
    overflow: hidden;
    box-shadow:
      0 24px 64px rgba(44,62,45,0.38),
      0 4px 16px rgba(44,62,45,0.18);
    animation: rise 0.75s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform: translateY(28px) scale(0.97); }
    to   { opacity:1; transform: translateY(0)    scale(1); }
  }

  .header {
    background: var(--deep);
    padding: 38px 32px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 25% 0%,   rgba(122,158,126,0.28) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(168,197,160,0.12) 0%, transparent 50%);
  }

  .lotus {
    margin: 0 auto 14px;
    position: relative; z-index: 1;
    animation: drop 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }

  .logo-img {
    width: 110px;
    height: auto;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
  }

  @keyframes drop {
    from { opacity:0; transform: translateY(-14px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 10px;
    color: #fff;
    position: relative; z-index:1;
    animation: up 0.8s 0.25s both;
  }
  .brand-sub {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-top: 5px;
    position: relative; z-index:1;
    animation: up 0.8s 0.35s both;
  }
  .rule {
    width: 44px; height: 1px;
    background: var(--sage);
    margin: 16px auto 12px;
    position: relative; z-index:1;
    animation: up 0.8s 0.4s both;
  }
  .header-desc {
    font-size: 11px;
    font-weight: 200;
    letter-spacing: 2px;
    color: var(--stone);
    text-transform: uppercase;
    position: relative; z-index:1;
    animation: up 0.8s 0.45s both;
  }
  @keyframes up {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--sage-dark), var(--sage-light), var(--sage-dark));
  }

  .form { padding: 34px 32px 38px; }

  .field { margin-bottom: 26px; animation: up 0.6s both; }
  .field:nth-child(1) { animation-delay: 0.5s; }
  .field:nth-child(2) { animation-delay: 0.6s; }
  .field:nth-child(3) { animation-delay: 0.7s; }

  .field-label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--sage-dark);
    margin-bottom: 10px;
  }
  .req { color: var(--sage); }

  input[type="text"],
  input[type="date"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--stone);
    padding: 10px 4px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
  }
  input:focus { border-bottom-color: var(--sage); }
  input::placeholder { color: #bbb; font-weight: 200; }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.35; cursor: pointer; }

  .pay-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .pay-opt {
    border: 1.5px solid var(--warm);
    border-radius: 8px;
    padding: 14px 10px 12px;
    text-align: center;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #999;
    cursor: pointer;
    background: white;
    transition: all 0.2s ease;
    user-select: none;
  }
  .pay-opt .icon { font-size: 20px; display: block; margin-bottom: 5px; }
  .pay-opt:hover {
    border-color: var(--sage-light);
    color: var(--sage-dark);
    background: rgba(122,158,126,0.05);
  }
  .pay-opt.selected {
    border-color: var(--sage);
    background: rgba(122,158,126,0.12);
    color: var(--sage-dark);
    font-weight: 400;
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: var(--deep);
    color: white;
    border: none;
    border-radius: 7px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    animation: up 0.6s 0.85s both;
  }
  .btn:hover { background: var(--sage-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(44,62,45,0.22); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner {
    display: none;
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success {
    display: none;
    text-align: center;
    padding: 52px 32px;
    animation: up 0.6s both;
  }
  .success-badge {
    width: 64px; height: 64px;
    background: rgba(122,158,126,0.13);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 26px;
  }
  .success h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    color: var(--deep);
    margin-bottom: 8px;
  }
  .success-rule { width: 36px; height: 1px; background: var(--sage); margin: 14px auto; }
  .success p { font-size: 13px; font-weight: 300; color: #888; line-height: 1.8; }

  .card-footer {
    border-top: 1px solid var(--warm);
    padding: 13px 32px;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .dot { width: 4px; height: 4px; background: var(--sage-light); border-radius: 50%; }
  .footer-txt { font-size: 10px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--stone); }
</style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="lotus">
      <img src="logo-aponia.jpeg" alt="Aponia Centro de Bienestar" class="logo-img">
    </div>
    <h1 class="brand">APONIA</h1>
    <p class="brand-sub">Centro de Bienestar</p>
    <div class="rule"></div>
    <p class="header-desc">Registro de pago</p>
  </div>

  <div class="accent-bar"></div>

  <div class="form" id="formBody">

    <div class="field">
      <label class="field-label" for="nombre">Nombre completo <span class="req">*</span></label>
      <input type="text" id="nombre" placeholder="Tu nombre y apellido" autocomplete="name">
    </div>

    <div class="field">
      <label class="field-label" for="fecha">Fecha <span class="req">*</span></label>
      <input type="date" id="fecha">
    </div>

    <div class="field">
      <label class="field-label">Método de pago <span class="req">*</span></label>
      <div class="pay-grid">
        <div class="pay-opt" onclick="selectPay(this,'Efectivo')">
          <span class="icon">💵</span>Efectivo
        </div>
        <div class="pay-opt" onclick="selectPay(this,'Tarjeta crédito')">
          <span class="icon">💳</span>Tarjeta crédito
        </div>
        <div class="pay-opt" onclick="selectPay(this,'Tarjeta débito')">
          <span class="icon">🏦</span>Tarjeta débito
        </div>
        <div class="pay-opt" onclick="selectPay(this,'Transferencia')">
          <span class="icon">📲</span>Transferencia
        </div>
      </div>
    </div>

    <button class="btn" id="btnSubmit" onclick="submitForm()">
      <span id="btnText">Confirmar registro</span>
      <div class="spinner" id="spinner"></div>
    </button>

  </div>

  <div class="success" id="successScreen">
    <div class="success-badge">🌿</div>
    <h2>¡Registro guardado!</h2>
    <div class="success-rule"></div>
    <p>Gracias por tu pago.<br>Te esperamos pronto en Aponia.</p>
  </div>

  <div class="card-footer">
    <div class="dot"></div>
    <p class="footer-txt">Aponia · Centro de Bienestar</p>
    <div class="dot"></div>
  </div>

</div>

<script>
  // ✏️ PEGA AQUÍ TU URL NUEVA DEL APPS SCRIPT
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6f0rkHcXjK5OnEKx95-GqFzCuWWV-gtIgVhPwn1GqRENbpND5KJDhFwoa9krghU1u/exec";

  let metodo = "";

  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('fecha').value = hoy;

  function selectPay(el, valor) {
    document.querySelectorAll('.pay-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    metodo = valor;
  }

  function submitForm() {
    const nombre = document.getElementById('nombre').value.trim();
    const fecha  = document.getElementById('fecha').value;

    if (!nombre || !fecha || !metodo) {
      alert("Completá todos los campos");
      return;
    }

    const btn = document.getElementById('btnSubmit');
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    btn.disabled = true;

    const data = { nombre, fechaPago: fecha, metodo };

    // mode: "no-cors" evita el error de CORS con Google Apps Script
    fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(() => {
      document.getElementById("formBody").style.display = "none";
      document.getElementById("successScreen").style.display = "block";
    })
    .catch(() => {
      alert("Error de red. Intentá de nuevo.");
      btn.disabled = false;
      document.getElementById('btnText').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
    });
  }
</script>

</body>
</html>
